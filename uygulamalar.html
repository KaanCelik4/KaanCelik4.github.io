<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Uygulamaları</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="main-container">
        <div class="app-card">
            <h2>Öğrenci Not Hesaplama</h2>
            <div class="input-group">
                <input type="text" id="adSoyad" placeholder="Ad Soyad">
                <input type="number" id="vizeNotu" placeholder="Vize Notu">
                <input type="number" id="finalNotu" placeholder="Final Notu">
                <button onclick="notHesapla()">Hesapla</button>
            </div>
            
            <div id="notSonuc" class="result-box" style="display:none;">
                <h3 id="resAd"></h3>
                <p id="resOrt"></p>
                <p id="resHarf"></p>
                <p id="resDurum"></p>
            </div>
        </div>

        <hr>

        <div class="app-card">
            <h2>Birim Dönüştürücü</h2>
            <div class="input-group">
                <label>Değer Giriniz</label>
                <input type="number" id="birimDeger" placeholder="Örn: 50">
                
                <label>Dönüşüm Tipi</label>
                <select id="donusumTipi">
                    <option value="c-f">Celsius - Fahrenheit</option>
                    <option value="m-km">Metre - Kilometre</option>
                    <option value="kg-gr">Kilogram - Gram</option>
                </select>
                
                <button onclick="birimHesapla()">Hesapla</button>
            </div>

            <div id="birimSonuc" class="result-box" style="display:none;">
                <h3 id="resBirim"></h3>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
