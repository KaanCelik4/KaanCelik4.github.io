<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Uygulamalar | Mustafa Kaan Çelik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="logo"><img src="logo.png" alt="Logo"></div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="about.html">Hakkında</a>
                <a href="uygulamalar.html">Uygulamalar</a>
                <a href="interests.html">Dersler</a>
                <a href="contact.html">İletişim</a>
            </div>
        </nav>

        <main class="app-container">
            <div class="app-card">
                <h3>Öğrenci Not Hesaplama</h3>
                <input type="text" id="adSoyad" class="input-style" placeholder="Ad Soyad">
                <input type="number" id="vize" class="input-style" placeholder="Vize Notu">
                <input type="number" id="final" class="input-style" placeholder="Final Notu">
                <button onclick="notHesapla()">Hesapla</button>
                <div id="notSonuc" class="result-box"></div>
            </div>

            <div class="app-card">
                <h3>Birim Dönüştürücü</h3>
                <input type="number" id="birimDeger" class="input-style" placeholder="Değer Girin">
                <select id="donusumTipi" class="input-style">
                    <option value="cf">Celsius - Fahrenheit</option>
                    <option value="mk">Metre - Kilometre</option>
                    <option value="kg">Kilogram - Gram</option>
                </select>
                <button onclick="birimDonustur()">Dönüştür</button>
                <div id="birimSonuc" class="result-box"></div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Mustafa Kaan Çelik | Web Programlama Ödevi</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
