<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uygulamalar | Mustafa Kaan Çelik</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="wrapper">
        <nav class="navbar">
            <div class="logo"><img src="logo.png" alt="Logo"></div>
            <div class="nav-links">
                <a href="index.html">Ana Sayfa</a>
                <a href="about.html">Hakkında</a>
                <a href="uygulamalar.html">Uygulamalar</a>
                <a href="interests.html">Dersler</a>
                <a href="contact.html">İletişim</a>
            </div>
        </nav>

        <main class="app-main">
            <div class="app-card">
                <h2>Öğrenci Not Hesaplama</h2>
                <div class="input-container">
                    <input type="text" id="adSoyad" placeholder="Ad Soyad">
                    <input type="number" id="vize" placeholder="Vize Notu">
                    <input type="number" id="final" placeholder="Final Notu">
                </div>
                <button class="btn-blue" onclick="notHesapla()">Hesapla</button>
                <div id="notSonuc" class="result-area"></div>
            </div>

            <div class="app-card">
                <h2>Birim Dönüştürücü</h2>
                <div class="input-container">
                    <input type="number" id="birimDeger" placeholder="Değer Giriniz">
                    <select id="donusumTipi">
                        <option value="cf">Celsius → Fahrenheit</option>
                        <option value="mk">Metre → Kilometre</option>
                        <option value="kg">Kilogram → Gram</option>
                    </select>
                </div>
                <button class="btn-blue" onclick="birimDonustur()">Hesapla</button>
                <div id="birimSonuc" class="result-area"></div>
            </div>
        </main>

        <footer class="footer">
            <p>© 2026 Mustafa Kaan Çelik | Web Programlama Ödevi</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
